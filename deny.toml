[advisories]
vulnerability = "deny"
unmaintained = "deny"
yanked = "deny"
notice = "deny"

[licenses]
unlicensed = "deny"
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-3-Clause",
    "ISC",
    "Unlicense",
    "CC0-1.0",
]
copyleft = "deny"
default = "deny"

[bans]
multiple-versions = "deny"
deny = [
    # Запретить дублирование популярных крейтов
    { name = "rand", version = "*" },
]
skip = [
    # Если какие-то крейты требуют несколько версий, добавить позже
]
