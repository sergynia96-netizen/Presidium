# cargo-deny configuration for Presidium.
# Format: cargo-deny >=0.18

[graph]
targets = ["x86_64-unknown-linux-gnu"]
all-features = false

[advisories]
yanked = "deny"
ignore = []

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-3-Clause",
    "CC0-1.0",
    "Unicode-3.0",
]
exceptions = []

[licenses.private]
ignore = true

[bans]
multiple-versions = "warn"
deny = []
skip = [
    # proptest pulls rand 0.9 → getrandom 0.3; tempfile/criterion → getrandom 0.2
    { name = "getrandom", version = "*" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
