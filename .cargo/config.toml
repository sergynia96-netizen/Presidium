# Android cross-compilation linker placeholder.
# The aarch64-linux-android target requires the Android NDK.
# On CI this target is checked without linking (cargo check only).
# Uncomment and set the correct path when building for Android locally.
# [target.aarch64-linux-android]
# linker = "aarch64-linux-android21-clang"

[profile.release]
strip = "symbols"
